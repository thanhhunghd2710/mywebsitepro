<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Finance Terminal | Multi-Asset & Energy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #0b0e14; 
            color: #e2e8f0; 
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(20, 30, 48, 0.4), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(20, 30, 48, 0.4), transparent 25%);
            min-height: 100vh;
        }
        .font-mono-num { font-family: 'JetBrains Mono', monospace; }
        .glass-panel {
            background: rgba(18, 22, 31, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .glass-panel:hover {
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.4);
        }
        
        /* Hiệu ứng nhấp nháy */
        @keyframes pulse-dot { 
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); } 
            70% { box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); } 
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } 
        }
        .live-dot { animation: pulse-dot 2s infinite; }
        .status-live { background-color: rgba(16, 185, 129, 0.15); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.3); }
        .status-closed { background-color: rgba(100, 116, 139, 0.15); color: #94a3b8; border: 1px solid rgba(100, 116, 139, 0.3); }

        /* Biến động giá */
        @keyframes flash-up {
            0% { background-color: rgba(16, 185, 129, 0.25); border-color: rgba(16, 185, 129, 0.5); }
            100% { background-color: transparent; border-color: rgba(255, 255, 255, 0.08); }
        }
        @keyframes flash-down {
            0% { background-color: rgba(239, 68, 68, 0.25); border-color: rgba(239, 68, 68, 0.5); }
            100% { background-color: transparent; border-color: rgba(255, 255, 255, 0.08); }
        }
        .price-flash-up { animation: flash-up 1s cubic-bezier(0.4, 0, 0.2, 1); }
        .price-flash-down { animation: flash-down 1s cubic-bezier(0.4, 0, 0.2, 1); }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0b0e14; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
    </style>
</head>
<body class="p-4 md:p-6 lg:p-10 flex flex-col items-center">

    <div class="w-full max-w-7xl">
        <header class="flex flex-col lg:flex-row justify-between items-center mb-8 gap-4 border-b border-gray-800 pb-6">
            <div class="text-center lg:text-left">
                <h1 class="text-3xl font-bold tracking-tight text-white mb-2 flex items-center justify-center lg:justify-start gap-2">
                    <svg class="w-8 h-8 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
                    Omni<span class="text-blue-500">Terminal</span>
                </h1>
                <div class="flex items-center justify-center lg:justify-start gap-2 text-sm text-gray-400 font-medium">
                    <span class="w-2 h-2 bg-emerald-500 rounded-full live-dot"></span>
                    <span>Crypto (Real) &bull; Global Energy & VN Stocks (Smart Mock)</span>
                </div>
            </div>
            
            <div class="flex gap-4">
                <div class="glass-panel px-5 py-2.5 rounded-xl flex items-center gap-3">
                    <svg class="w-4 h-4 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    <span id="current-time" class="font-mono-num text-sm text-gray-200 font-medium">--:--:--</span>
                </div>
            </div>
        </header>

        <main id="terminal-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-5">
            </main>
    </div>

    <script>
        // Cấu hình tài sản: Bổ sung Dầu Brent, Natural Gas. VN Stock gán thêm biến market = 'vn_stock'
        const assetsConfig = [
            { id: 'btc', name: 'Bitcoin', ticker: 'BTC/USDT', icon: '₿', iconColor: 'text-orange-500', currency: '$', decimals: 2, type: 'binance', symbol: 'BTCUSDT', market: 'crypto' },
            { id: 'gold', name: 'Global Gold', ticker: 'PAXG/USDT', icon: 'Au', iconColor: 'text-yellow-500', currency: '$', decimals: 2, type: 'binance', symbol: 'PAXGUSDT', market: 'crypto' },
            { id: 'brent', name: 'Brent Crude', ticker: 'UKOIL', icon: '🛢', iconColor: 'text-gray-300', currency: '$', decimals: 2, type: 'mock', basePrice: 87.20, vol: 0.04, market: 'global_247' },
            { id: 'wti', name: 'WTI Crude Oil', ticker: 'USOIL', icon: '⛽', iconColor: 'text-gray-400', currency: '$', decimals: 2, type: 'mock', basePrice: 83.50, vol: 0.04, market: 'global_247' },
            { id: 'ng', name: 'Natural Gas', ticker: 'NATGAS', icon: '🔥', iconColor: 'text-blue-400', currency: '$', decimals: 3, type: 'mock', basePrice: 1.850, vol: 0.005, market: 'global_247' },
            { id: 'fpt', name: 'FPT Corp', ticker: 'FPT', icon: '📈', iconColor: 'text-blue-500', currency: '₫', decimals: 0, type: 'mock', basePrice: 115500, vol: 150, market: 'vn_stock' },
            { id: 'vcb', name: 'Vietcombank', ticker: 'VCB', icon: '🏦', iconColor: 'text-green-500', currency: '₫', decimals: 0, type: 'mock', basePrice: 95000, vol: 100, market: 'vn_stock' },
            { id: 'hpg', name: 'Hoa Phat Group', ticker: 'HPG', icon: '🏗', iconColor: 'text-red-500', currency: '₫', decimals: 0, type: 'mock', basePrice: 30250, vol: 50, market: 'vn_stock' }
        ];

        const priceState = {};
        const mockDataStore = {};

        // 1. Kiểm tra giờ giao dịch Chứng khoán VN (Phiên sáng 9h-11h30, Phiên chiều 13h-15h)
        function isVNMarketOpen() {
            const now = new Date();
            const day = now.getDay();
            const timeVal = now.getHours() * 60 + now.getMinutes();

            if (day === 0 || day === 6) return false; // Cuối tuần đóng cửa
            if (timeVal >= 540 && timeVal <= 690) return true; // 09:00 - 11:30
            if (timeVal >= 780 && timeVal <= 900) return true; // 13:00 - 15:00
            
            return false;
        }

        // 2. Render Giao diện ban đầu
        function initTerminal() {
            const grid = document.getElementById('terminal-grid');
            let html = '';

            assetsConfig.forEach(asset => {
                priceState[asset.id] = null;
                
                html += `
                <div id="card-${asset.id}" class="glass-panel rounded-xl p-5 relative overflow-hidden flex flex-col justify-between h-full">
                    <div>
                        <div class="flex justify-between items-start mb-4">
                            <div class="flex items-center gap-3">
                                <div class="w-9 h-9 rounded-lg bg-white/5 border border-white/10 flex items-center justify-center text-lg shadow-inner ${asset.iconColor}">
                                    ${asset.icon}
                                </div>
                                <div>
                                    <h2 class="text-sm font-bold text-gray-100 leading-tight">${asset.ticker}</h2>
                                    <span class="text-gray-500 text-[10px] font-semibold tracking-wide uppercase">${asset.name}</span>
                                </div>
                            </div>
                            <div id="market-status-${asset.id}" class="px-1.5 py-0.5 rounded text-[9px] font-bold uppercase tracking-wider">
                                --
                            </div>
                        </div>
                        
                        <div class="mb-5">
                            <div class="text-2xl font-bold font-mono-num tracking-tight text-white flex items-baseline gap-1">
                                <span class="text-gray-500 text-lg">${asset.currency}</span>
                                <span id="price-${asset.id}">---</span>
                            </div>
                        </div>
                    </div>

                    <div class="flex items-end justify-between pt-3 border-t border-gray-700/50">
                        <div id="badge-${asset.id}" class="px-2 py-1 rounded text-xs font-bold font-mono-num bg-gray-800 text-gray-400">
                            --%
                        </div>
                        <div class="text-right">
                            <p class="text-gray-500 text-[9px] uppercase font-bold tracking-wider mb-0.5">24h Range</p>
                            <p class="font-mono-num text-[11px] text-gray-400">
                                <span id="low-${asset.id}">--</span> - <span id="high-${asset.id}">--</span>
                            </p>
                        </div>
                    </div>
                </div>`;
            });

            grid.innerHTML = html;
        }

        const formatMoney = (number, decimals) => {
            return new Intl.NumberFormat('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals }).format(number);
        };

        function updateClock() {
            const now = new Date();
            document.getElementById('current-time').innerText = now.toLocaleTimeString('vi-VN', { hour12: false }) + ' - ' + now.toLocaleDateString('vi-VN');
        }

        // 3. Cập nhật dữ liệu lên UI
        function updateUI(asset, currentPrice, high, low, changePercent) {
            const { id, decimals, market } = asset;
            const card = document.getElementById(`card-${id}`);
            
            // Format Data
            document.getElementById(`price-${id}`).innerText = formatMoney(currentPrice, decimals);
            document.getElementById(`high-${id}`).innerText = formatMoney(high, decimals);
            document.getElementById(`low-${id}`).innerText = formatMoney(low, decimals);

            // Cập nhật Badge %
            const badgeEl = document.getElementById(`badge-${id}`);
            const change = parseFloat(changePercent);
            if (change > 0) {
                badgeEl.innerText = `+${change.toFixed(2)}%`;
                badgeEl.className = 'px-2 py-1 rounded text-xs font-bold font-mono-num bg-emerald-500/10 text-emerald-400 border border-emerald-500/20';
            } else if (change < 0) {
                badgeEl.innerText = `${change.toFixed(2)}%`;
                badgeEl.className = 'px-2 py-1 rounded text-xs font-bold font-mono-num bg-red-500/10 text-red-400 border border-red-500/20';
            } else {
                badgeEl.innerText = `0.00%`;
                badgeEl.className = 'px-2 py-1 rounded text-xs font-bold font-mono-num bg-gray-800 text-gray-400 border border-gray-700';
            }

            // Xử lý Market Status (Đang mở hay Đã đóng)
            const statusEl = document.getElementById(`market-status-${id}`);
            const isVNClosed = (market === 'vn_stock' && !isVNMarketOpen());
            
            if (isVNClosed) {
                statusEl.innerText = "CLOSED";
                statusEl.className = "px-1.5 py-0.5 rounded text-[9px] font-bold uppercase tracking-wider status-closed";
            } else {
                statusEl.innerText = "LIVE";
                statusEl.className = "px-1.5 py-0.5 rounded text-[9px] font-bold uppercase tracking-wider status-live live-dot";
                
                // Chỉ nháy sáng nếu thị trường đang Live và giá thực sự thay đổi
                const oldPrice = priceState[id];
                if (oldPrice !== null && currentPrice !== oldPrice) {
                    card.classList.remove('price-flash-up', 'price-flash-down');
                    void card.offsetWidth; 
                    card.classList.add(currentPrice > oldPrice ? 'price-flash-up' : 'price-flash-down');
                }
            }
            
            priceState[id] = currentPrice;
        }

        // 4. Fetch Dữ liệu Binance (Crypto/Vàng)
        async function fetchBinanceData(asset) {
            try {
                const res = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${asset.symbol}`);
                const data = await res.json();
                updateUI(asset, parseFloat(data.lastPrice), parseFloat(data.highPrice), parseFloat(data.lowPrice), data.priceChangePercent);
            } catch (error) {
                console.error(`Lỗi API ${asset.name}:`, error);
            }
        }

        // 5. Smart Mock Data (Xử lý đóng/mở cửa)
        function generateMockData(asset) {
            if (!mockDataStore[asset.id]) {
                mockDataStore[asset.id] = { open: asset.basePrice, current: asset.basePrice, high: asset.basePrice * 1.01, low: asset.basePrice * 0.99 };
            }
            const store = mockDataStore[asset.id];
            
            // NẾU THỊ TRƯỜNG ĐÓNG CỬA: Giữ nguyên giá cũ, chỉ update UI trạng thái CLOSED, bỏ qua đoạn random
            if (asset.market === 'vn_stock' && !isVNMarketOpen()) {
                const changePercent = ((store.current - store.open) / store.open) * 100;
                updateUI(asset, store.current, store.high, store.low, changePercent);
                return;
            }

            // NẾU THỊ TRƯỜNG MỞ CỬA: Random biến động giá
            const move = (Math.random() - 0.45) * asset.vol; 
            store.current = store.current + move;
            
            if (store.current > store.high) store.high = store.current;
            if (store.current < store.low) store.low = store.current;

            const changePercent = ((store.current - store.open) / store.open) * 100;
            const finalPrice = asset.decimals === 0 ? Math.round(store.current / 10) * 10 : store.current;

            updateUI(asset, finalPrice, store.high, store.low, changePercent);
        }

        // Khởi động Main Loop
        function coreLoop() {
            assetsConfig.forEach(asset => {
                if (asset.type === 'binance') {
                    if (!asset.lastFetch || Date.now() - asset.lastFetch > 3000) { // Binance 3s/lần
                        fetchBinanceData(asset);
                        asset.lastFetch = Date.now();
                    }
                } else if (asset.type === 'mock') {
                    generateMockData(asset); // Mock 1s/lần
                }
            });
        }

        initTerminal();
        setInterval(updateClock, 1000);
        updateClock();
        
        coreLoop(); 
        setInterval(coreLoop, 1500); // Set nhịp update tổng là 1.5s để đỡ rối mắt

    </script>
</body>
</html>
